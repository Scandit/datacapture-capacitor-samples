<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>MatrixScan AR Simple Sample</title>
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <meta name="msapplication-tap-highlight" content="no">

  <script type="module" src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.esm.js"></script>
  <script nomodule src="https://unpkg.com/@ionic/pwa-elements@latest/dist/ionicpwaelements/ionicpwaelements.js"></script>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <meta name="theme-color" content="#31d53d">

  <style>
    :root {
      --fill-0: #16191C;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: absolute;
      margin: 0;
      font-family: 'Roboto', Arial, Helvetica, sans-serif;
    }

    button {
      width: 90vw;
      height: 60px;
      background: #2ec1ce;
      border: none;
      color: white;
      font-size: 1em;
      font-weight: bold;
    }

    .return-button-container {
      padding-left: 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .return-button {
      background: #5C6266;
      border: none;
      padding: 0;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .return-button img {
      width: 28px;
      height: 28px;
    }

    .return-button-text {
      font-family: 'Roboto', sans-serif;
      font-size: 10px;
      color: white;
      margin: 0;
      text-align: center;
    }

    .toolbar {
      height: 75px;
      background-color: black;
      padding-top: calc(env(safe-area-inset-top, 0px) + 28px);
      padding-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toolbar-title {
      font-family: 'Roboto', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: white;
      margin: 0;
    }

    .bottom-toolbar {
      display: flex;
      padding-top: 48px;
      padding-bottom: 48px;
      background-color: black;
      justify-content: left-start;
      align-items: center;
    }

    #barcode-ar-view {
      flex: 1;
      position: relative;
      width: 100%;
      height: 100%;
    }

    .top {
      position: relative;
      top: 0;
      width: 100vw;
      height: 100vh;
    }

    .bottom {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 40px);
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #list {
      width: 100vw;
      height: calc(
        100vh - env(safe-area-inset-top, 20px) - calc(env(safe-area-inset-bottom, 0px) + 40px) - 20px - 60px
      );
      padding-top: env(safe-area-inset-top, 20px);
      overflow: scroll;
    }

    .result {
      margin: 10px;
      padding: 10px;
      border-bottom: 1px solid lightgrey;
    }

    .result p {
      margin: 0;
    }

    .symbology {
      color: #2ec1ce;
      font-size: 0.9em;
    }

    #home {
      background-color: #f7f7f7;
      width: 100vw;
      height: 100vh;
      overflow-y: auto;
      position: relative;
    }

    .home-content {
      padding: 48px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 48px;
    }

    .scanning-screen {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .header-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 238px;
    }

    .logo {
      width: 95.2px;
      height: 14px;
    }

    .logo img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .title {
      font-family: 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 38px;
      color: #077f8a;
      letter-spacing: 0.5px;
      text-align: left;
      margin: 0;
      white-space: nowrap;
    }

    .features-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .features-label {
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: normal;
      color: #16191c;
      margin: 0;
    }

    .features-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }

    .feature-card {
      background-color: #16191c;
      flex: 1 1 calc(50% - 8px);
      min-width: 150px;
      max-width: 164px;
      height: 164px;
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .feature-card:active {
      opacity: 0.8;
    }

    .feature-icon {
      background-color: #ffffff;
      width: 36px;
      height: 36px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-icon img {
      width: 24px;
      height: 24px;
    }

    .feature-content {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .feature-title {
      font-family: 'Roboto', sans-serif;
      font-size: 16px;
      font-weight: 500;
      line-height: 22px;
      color: #ffffff;
      margin: 0;
    }

    .feature-description {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      line-height: 21px;
      color: #ffffff;
      margin: 0;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="home">
    <div class="home-content">
      <div class="header-section">
        <div class="logo">
          <img src="assets/logo.svg" alt="Scandit Logo" />
        </div>
        <h1 class="title">MatrixScan AR</h1>
      </div>

      <div class="features-section">
        <p class="features-label">Try These Features:</p>
        <div class="features-grid">
          <div class="feature-card" id="highlights-card">
            <div class="feature-icon">
              <img src="assets/scan.svg" alt="Scan" />
            </div>
            <div class="feature-content">
              <p class="feature-title">Highlights</p>
              <p class="feature-description">Visualize scanned codes</p>
            </div>
          </div>

          <div class="feature-card" id="info-annotations-card">
            <div class="feature-icon">
              <img src="assets/tooltip.svg" alt="Info" />
            </div>
            <div class="feature-content">
              <p class="feature-title">Info Annotations</p>
              <p class="feature-description">Show additional information</p>
            </div>
          </div>

          <div class="feature-card" id="popovers-card">
            <div class="feature-icon">
              <img src="assets/outbox.svg" alt="Popovers" />
            </div>
            <div class="feature-content">
              <p class="feature-title">Popovers</p>
              <p class="feature-description">Take action on scanned codes</p>
            </div>
          </div>

          <div class="feature-card" id="status-icons-card">
            <div class="feature-icon">
              <img src="assets/status.svg" alt="Status" />
            </div>
            <div class="feature-content">
              <p class="feature-title">Status icons</p>
              <p class="feature-description">Provide short information</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="scanning" class="hidden scanning-screen">
    <div class="toolbar">
      <p class="toolbar-title" id="toolbar-title">Highlights</p>
    </div>
    <div id="barcode-ar-view"></div>
    <div class="bottom-toolbar">
      <div class="return-button-container">
        <button class="return-button" id="return-button">
          <img src="assets/ic_return.svg" alt="Return" />
        </button>
        <p class="return-button-text">Return</p>
      </div>
    </div>
  </div>

  <div id="results" class="hidden">
    <div id="list" class="top"></div>
    <div class="bottom">
      <button id="scan-again">SCAN AGAIN</button>
    </div>
  </div>
</body>
</html>
